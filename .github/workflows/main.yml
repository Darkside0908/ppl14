name: OTF Testing

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Functional Test (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser:
          - firefox
          - chrome
          - edge

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Create Isolated network
        run: docker network create --driver bridge isolated

      - name: Deploy AUT
        run: docker build -t my-php-site:latest .

      - name: Run AUT
        run: docker run --network=isolated -p 80:80 --name docker-apache -t -d my-php-site:latest

      - name: Get AUT URL
        run: |
          # Selenium and the AUT share the "isolated" user-defined network,
          # so the browser (running inside the selenium container) resolves
          # the AUT via Docker's embedded DNS using its container name.
          echo "URL=http://docker-apache" >> $GITHUB_ENV

      - name: Check AUT Url
        run: curl --fail --retry 5 --retry-delay 2 http://localhost

      - name: Deploy Selenium
        run: |
          case "${{ matrix.browser }}" in
            firefox) IMAGE=selenium/standalone-firefox:latest ;;
            chrome)  IMAGE=selenium/standalone-chrome:latest ;;
            edge)    IMAGE=selenium/standalone-edge:latest ;;
          esac

          docker run -d \
            --network=isolated \
            --name selenium \
            --shm-size=2g \
            -p 4444:4444 \
            -p 7900:7900 \
            "$IMAGE"

      - name: Wait until Selenium Ready
        run: bash wait.sh

      - name: Selenium status & running containers
        if: always()
        run: |
          echo "---- docker ps ----"
          docker ps -a
          echo "---- Selenium /status ----"
          curl -s http://localhost:4444/status || true

      - name: Install Selenium client
        run: pip install -U selenium

      - name: Run Test
        run: python -u tests/hello_aut.py "${{ env.URL }}" "${{ matrix.browser }}"

      - name: Upload Screenshot Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homepage-${{ matrix.browser }}
          path: homepage.png
          if-no-files-found: warn

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "---- selenium logs ----"
          docker logs selenium || true
          echo "---- docker-apache logs ----"
          docker logs docker-apache || true

      - name: Cleanup Docker resources
        if: always()
        run: |
          docker stop selenium docker-apache 2>/dev/null || true
          docker rm -f selenium docker-apache 2>/dev/null || true
          docker network rm isolated 2>/dev/null || true