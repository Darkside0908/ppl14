name: OTF Testing

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Functional Test (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser:
          - firefox
          - chrome
          - edge

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Create Isolated network
        run: docker network create --driver bridge isolated

      - name: Deploy AUT
        run: docker build -t my-php-site:latest .

      - name: Run AUT
        run: docker run --network=isolated -p 80:80 --name docker-apache -t -d my-php-site:latest

      - name: Get AUT URL
        run: |
          URL=http://$(ip -f inet -o addr show docker0 | awk '{print $4}' | cut -d '/' -f 1)
          echo "URL=$URL" >> $GITHUB_ENV
      - name: Check AUT Url
        run: curl ${{ env.URL }}

      - name: Deploy Selenium
        run: |
          if [ "${{ matrix.browser }}" = "firefox" ]; then
            IMAGE=selenium/standalone-firefox
          elif [ "${{ matrix.browser }}" = "chrome" ]; then
            IMAGE=selenium/standalone-chrome
          else
            IMAGE=selenium/standalone-edge
          fi

          docker run -d \
            --network=isolated \
            --name selenium \
            -p 4444:4444 \
            -p 7900:7900 \
            $IMAGE
        
      - name: Wait until Selenium Ready
        run: sh wait.sh

      - name: Check the Hub
        run: curl http://localhost:4444/ui

      - name: Install Selenium client
        run: pip install -U selenium

      - name: Run Test
        run: python tests/hello_aut.py ${{ env.URL }}

      - name: Upload Homepage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Homepage
          path: homepage.png

      - name: stop docker
        run: docker stop docker-apache